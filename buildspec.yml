version: 0.2
env:
  parameter-store:
    SSH_KEY: "EC2_SSH_KEY"
    EC2_IP: "EC2_IP"
    S3_BUCKET: "S3_BUCKET"
phases:
  build:
    commands:
      - python3 procesar.py
      - test -f resultado.txt || exit 1
  post_build:
    commands:
      - mkdir -p ~/.ssh
      - echo "$SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts
      - aws s3 cp index.html s3://$S3_BUCKET/index.html
      - scp -i ~/.ssh/id_rsa Estados.txt procesar.py ubuntu@$EC2_IP:/var/www/html/
      - ssh -i ~/.ssh/id_rsa ubuntu@$EC2_IP "cd /var/www/html/ && python3 procesar.py"